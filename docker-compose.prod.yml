# ============================================================
# docker-compose.prod.yml — 生产环境
#
# 服务器首次部署:
#   mkdir -p /data/openpanda/{pgdata,uploads,backups}
#   docker-compose -f docker-compose.prod.yml up -d
#
# 数据全部存储在宿主机 /data/openpanda/ 下，
# 不受容器删除/重建/软件更新影响。
# ============================================================
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openpanda-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openpanda
    ports:
      - '5432:5432'
    volumes:
      - /data/openpanda/pgdata:/var/lib/postgresql/data
      - /data/openpanda/backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: openpanda-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - /data/openpanda/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: clintonluo/openpanda-backend:latest
    container_name: openpanda-backend
    restart: always
    ports:
      - '8080:8080'
    environment:
      SERVER_PORT: '8080'
      GIN_MODE: release
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: openpanda
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Shanghai
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ''
      JWT_SECRET: change-me-to-a-strong-secret-in-production
    volumes:
      - /data/openpanda/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: clintonluo/openpanda-frontend:latest
    container_name: openpanda-frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend

# 不使用命名卷 —— 全部 bind mount 到 /data/openpanda/
